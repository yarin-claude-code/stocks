services:
  backend:
    build:
      context: ./backend
    env_file: ./backend/.env
    restart: unless-stopped
    network_mode: host

  frontend:
    build:
      context: ./frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_API_URL: ""
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.stocks.rule=Host(`stocks.srv1030125.hstgr.cloud`)
      - traefik.http.routers.stocks.entrypoints=web,websecure
      - traefik.http.routers.stocks.tls=true
      - traefik.http.routers.stocks.tls.certresolver=mytlschallenge
      - traefik.http.services.stocks.loadbalancer.server.port=80
    networks:
      - traefik

networks:
  traefik:
    external: true
    name: root_default
